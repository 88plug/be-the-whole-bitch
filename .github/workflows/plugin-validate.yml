name: plugin-validate
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh (for shell-portability checks)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet pyyaml
      - name: Validate plugin manifest & surfaces
        run: python .ci/validate_plugin.py .
      - name: Smoke test (scripts + hooks wiring)
        run: bash tests/smoke.sh
      - name: Simulator KPI gate (sample corpus)
        run: |
          python evals/simulator.py \
            --root "${HOME}/.claude/projects" \
            --limit 500 \
            --json > /tmp/sim.json || true
          python -c "
          import json, sys
          from pathlib import Path
          p = Path('/tmp/sim.json')
          if not p.exists() or p.stat().st_size < 10:
              print('skip simulator KPI: no local corpus in CI')
              sys.exit(0)
          r = json.loads(p.read_text())
          s = r['summary']
          assert s['assistant_end_turns'] >= 50, s
          assert s['eval_trap_failures'] >= 1, s
          print('simulator KPI ok:', s['eval_trap_failures'], 'trap failures')
          "